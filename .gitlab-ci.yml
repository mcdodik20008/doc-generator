variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

stages:
  - build
  - package
  - deploy

# ─────────────────────────────────────────────
# Шаблон для Gradle-джобов (кэш зависимостей)
# ─────────────────────────────────────────────
.gradle:
  image: eclipse-temurin:21-jdk
  variables:
    GRADLE_USER_HOME: "${CI_PROJECT_DIR}/.gradle"
  before_script:
    - chmod +x gradlew
  cache:
    key: gradle
    paths:
      - .gradle/caches/
      - .gradle/wrapper/

# ─────────────────────────────────────────────
# Тесты — автоматически на MR, вручную на main
# ─────────────────────────────────────────────
test:
  extends: .gradle
  stage: build
  script:
    - ./gradlew test --no-daemon
  artifacts:
    when: always
    reports:
      junit: "**/build/test-results/test/TEST-*.xml"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: true

# ─────────────────────────────────────────────
# Сборка fat-jar (параллельно с тестами)
# ─────────────────────────────────────────────
build:
  extends: .gradle
  stage: build
  script:
    - ./gradlew bootJar --no-daemon -x test
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ─────────────────────────────────────────────
# Docker-образ → GitLab Registry (Kaniko)
# Без DinD, без privileged, без ожидания демона
# ─────────────────────────────────────────────
package:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  needs:
    - job: build
      artifacts: true
  before_script:
    - mkdir -p /kaniko/.docker
    - |-
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64)\"}}}" \
        > /kaniko/.docker/config.json
  script:
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}:latest"
      --cache=true
      --cache-repo="${CI_REGISTRY_IMAGE}/cache"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

