<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Doc Generator — Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <link rel="stylesheet" href="/css/common.css"/>
    <script src="/js/common.js"></script>
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        /* ======== Stats Cards ======== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ======== Section Header ======== */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
        }

        .add-user-btn {
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-user-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* ======== Users Table ======== */
        .users-table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table th {
            background: var(--surface2);
            padding: 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .users-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .users-table tr:last-child td {
            border-bottom: none;
        }

        .users-table tr:hover {
            background: var(--surface2);
        }

        .user-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 4px;
        }

        .user-badge.admin {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .user-badge.user {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.enabled {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        .status-badge.disabled {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            margin-right: 4px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .action-btn.danger:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* ======== Modal ======== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }
    </style>
</head>
<body>
<div id="app-container">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="main-content">
        <div class="admin-container">
            <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 32px;">Admin Panel</h1>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="value" th:text="${totalUsers}">0</div>
                    <div class="label">Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="value" th:text="${enabledUsers}">0</div>
                    <div class="label">Active Users</div>
                </div>
                <div class="stat-card">
                    <div class="value" th:text="${totalChats}">0</div>
                    <div class="label">Total Chats</div>
                </div>
            </div>

            <!-- Users Section -->
            <div class="section-header">
                <div class="section-title">Users</div>
                <button class="add-user-btn" onclick="openCreateUserModal()">+ Add User</button>
            </div>

            <div class="users-table-container">
                <div id="loading" class="loading">Loading...</div>
                <table class="users-table" id="usersTable" style="display: none;">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Roles</th>
                        <th>Status</th>
                        <th>Chats</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Create/Edit User Modal -->
<div id="userModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" id="modalTitle">Create User</div>
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password">
                <small style="color: var(--text-muted); font-size: 11px;" id="passwordHint">Leave blank to keep current</small>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="role">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="enabled">
                    <option value="true">Enabled</option>
                    <option value="false">Disabled</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    let users = [];

    async function loadUsers() {
        try {
            const response = await fetch('/api/admin/users');
            users = await response.json();
            renderUsers();
        } catch (error) {
            console.error('Failed to load users:', error);
            alert('Failed to load users');
        }
    }

    function renderUsers() {
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';

        users.forEach(user => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${user.id}</td>
                <td><strong>${esc(user.username)}</strong></td>
                <td>${esc(user.email || '-')}</td>
                <td>
                    ${user.roles.map(role => `<span class="user-badge ${role.toLowerCase()}">${role}</span>`).join('')}
                </td>
                <td>
                    <span class="status-badge ${user.enabled ? 'enabled' : 'disabled'}">
                        ${user.enabled ? 'Active' : 'Disabled'}
                    </span>
                </td>
                <td>${user.chatCount}</td>
                <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                <td>
                    <button class="action-btn" onclick="editUser(${user.id})">Edit</button>
                    <button class="action-btn" onclick="toggleUserStatus(${user.id}, ${!user.enabled})">${user.enabled ? 'Disable' : 'Enable'}</button>
                    <button class="action-btn danger" onclick="deleteUser(${user.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('usersTable').style.display = 'table';
    }

    function openCreateUserModal() {
        document.getElementById('modalTitle').textContent = 'Create User';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('passwordHint').style.display = 'none';
        document.getElementById('userModal').classList.add('active');
    }

    function editUser(userId) {
        const user = users.find(u => u.id === userId);
        if (!user) return;

        document.getElementById('modalTitle').textContent = 'Edit User';
        document.getElementById('userId').value = user.id;
        document.getElementById('username').value = user.username;
        document.getElementById('email').value = user.email || '';
        document.getElementById('password').value = '';
        document.getElementById('role').value = user.roles.includes('ADMIN') ? 'ADMIN' : 'USER';
        document.getElementById('enabled').value = user.enabled.toString();
        document.getElementById('passwordHint').style.display = 'block';
        document.getElementById('userModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('userModal').classList.remove('active');
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const userId = document.getElementById('userId').value;
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;
        const enabled = document.getElementById('enabled').value === 'true';

        const isEdit = userId !== '';

        try {
            const url = isEdit ? `/api/admin/users/${userId}` : '/api/admin/users';
            const method = isEdit ? 'PUT' : 'POST';

            const body = isEdit
                ? { email: email || null, enabled, roles: [role], ...(password && { password }) }
                : { username, email: email || null, password, enabled, roles: [role] };

            const response = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });

            if (response.ok) {
                closeModal();
                loadUsers();
            } else {
                const error = await response.text();
                alert('Error: ' + error);
            }
        } catch (error) {
            console.error('Failed to save user:', error);
            alert('Failed to save user');
        }
    });

    async function toggleUserStatus(userId, enabled) {
        try {
            const response = await fetch(`/api/admin/users/${userId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled }),
            });

            if (response.ok) {
                loadUsers();
            } else {
                alert('Failed to update user status');
            }
        } catch (error) {
            console.error('Failed to update user:', error);
            alert('Failed to update user');
        }
    }

    async function deleteUser(userId) {
        if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
            return;
        }

        try {
            const response = await fetch(`/api/admin/users/${userId}`, {
                method: 'DELETE',
            });

            if (response.ok) {
                loadUsers();
            } else {
                alert('Failed to delete user');
            }
        } catch (error) {
            console.error('Failed to delete user:', error);
            alert('Failed to delete user');
        }
    }

    function esc(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Load users on page load
    loadUsers();
</script>
</body>
</html>
