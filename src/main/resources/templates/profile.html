<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Doc Generator — Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <link rel="stylesheet" href="/css/common.css"/>
    <script src="/js/common.js"></script>
    <style>
        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        /* ======== User Info Card ======== */
        .user-info-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: white;
        }

        .user-details h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .user-details .email {
            color: var(--text-muted);
            font-size: 14px;
        }

        .user-roles {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .role-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
        }

        .user-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ======== Chats Section ======== */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
        }

        .new-chat-btn {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .chat-card:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .chat-info {
            flex: 1;
        }

        .chat-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .chat-action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .chat-action-btn.delete:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div id="app-container">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="main-content">
        <div class="profile-container">
            <!-- User Info Card -->
            <div class="user-info-card">
                <div class="user-header">
                    <div class="user-avatar" th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">U</div>
                    <div class="user-details">
                        <h1 th:text="${user.username}">Username</h1>
                        <div class="email" th:text="${user.email ?: 'No email set'}">email@example.com</div>
                        <div class="user-roles">
                            <span class="role-badge" th:each="role : ${user.roles}" th:text="${role}">USER</span>
                        </div>
                    </div>
                </div>

                <div class="user-stats">
                    <div class="stat-item">
                        <div class="stat-value" th:text="${chatCount}">0</div>
                        <div class="stat-label">Total Chats</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}">2024-01-01</div>
                        <div class="stat-label">Member Since</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt, 'yyyy-MM-dd') : 'Never'}">Never</div>
                        <div class="stat-label">Last Login</div>
                    </div>
                </div>
            </div>

            <!-- Chats Section -->
            <div class="section-header">
                <div class="section-title">Your Chats</div>
                <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
            </div>

            <div class="chats-list" th:if="${!chats.isEmpty()}">
                <div class="chat-card" th:each="chat : ${chats}" th:attr="data-session-id=${chat.sessionId}">
                    <div class="chat-info" th:onclick="'openChat(\'' + ${chat.sessionId} + '\')'">
                        <div class="chat-title" th:text="${chat.title}">Chat Title</div>
                        <div class="chat-meta">
                            <span th:text="${#temporals.format(chat.updatedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</span>
                            <span th:if="${chat.applicationId != null}"> • App ID: <span th:text="${chat.applicationId}">1</span></span>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="chat-action-btn delete" th:onclick="'deleteChat(' + ${chat.id} + ', event)'">Delete</button>
                    </div>
                </div>
            </div>

            <div class="empty-state" th:if="${chats.isEmpty()}">
                <div class="empty-state-icon">💬</div>
                <div>No chats yet. Start a conversation!</div>
            </div>
        </div>
    </main>
</div>

<script>
    async function loadChatStats() {
        try {
            const response = await fetch('/api/chat/sessions/stats');
            if (!response.ok) return;
            const stats = await response.json();

            // Update "Total Chats" stat if available
            const statValues = document.querySelectorAll('.stat-item');
            statValues.forEach(item => {
                const label = item.querySelector('.stat-label');
                const value = item.querySelector('.stat-value');
                if (label && value && label.textContent.trim() === 'Total Chats') {
                    if (stats.totalChats != null) {
                        value.textContent = stats.totalChats;
                    } else if (stats.totalSessions != null) {
                        value.textContent = stats.totalSessions;
                    }
                }
            });
        } catch (error) {
            console.error('Failed to load chat stats:', error);
        }
    }

    loadChatStats();

    function createNewChat() {
        window.location.href = '/chat';
    }

    function openChat(sessionId) {
        window.location.href = '/chat?sessionId=' + sessionId;
    }

    async function deleteChat(chatId, event) {
        event.stopPropagation();

        if (!confirm('Are you sure you want to delete this chat?')) {
            return;
        }

        try {
            const response = await fetch(`/api/chat/sessions/${chatId}`, {
                method: 'DELETE',
            });

            if (response.ok) {
                // Reload page to show updated list
                window.location.reload();
            } else {
                alert('Failed to delete chat');
            }
        } catch (error) {
            console.error('Error deleting chat:', error);
            alert('Failed to delete chat');
        }
    }
</script>
</body>
</html>
