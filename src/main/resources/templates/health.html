<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <title>Doc Generator — Health</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <link rel="stylesheet" href="/css/common.css"/>
    <script src="/js/common.js"></script>
    <style>
        .health-section {
            padding: 0 32px 16px;
        }
        .health-section-title {
            font-size: 14px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin: 24px 0 12px; padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .health-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .health-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
            padding: 20px 24px;
            transition: border-color .2s;
        }
        .health-card:hover { border-color: var(--accent-dim); }
        .health-card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .health-card-name {
            font-size: 16px; font-weight: 600; text-transform: capitalize;
        }
        .health-card-icon {
            font-size: 20px; margin-right: 8px;
        }
        .health-card-title {
            display: flex; align-items: center;
        }

        .health-status {
            font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 12px;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .health-status::before {
            content: ''; width: 8px; height: 8px; border-radius: 50%;
            display: inline-block;
        }
        .health-up { background: #1a3a2a; color: var(--green); }
        .health-up::before { background: var(--green); }
        .health-down { background: #3a1a2a; color: var(--red); }
        .health-down::before { background: var(--red); animation: pulse 1.5s infinite; }
        .health-unknown { background: var(--surface2); color: var(--text-muted); }
        .health-unknown::before { background: var(--text-muted); }

        .health-details {
            font-size: 13px; color: var(--text-muted); line-height: 1.6;
        }
        .health-details dt {
            color: var(--text-muted); font-size: 11px; text-transform: uppercase;
            letter-spacing: 0.5px; margin-top: 8px;
        }
        .health-details dd {
            color: var(--text); font-family: 'Consolas', monospace; font-size: 13px;
            word-break: break-all;
        }

        .overall-card {
            border-color: var(--accent-dim);
            grid-column: 1 / -1;
        }
        .overall-card .health-card-name {
            font-size: 20px;
        }
        .overall-summary {
            display: flex; gap: 24px; margin-top: 12px; flex-wrap: wrap;
        }
        .overall-stat {
            font-size: 14px; color: var(--text-muted);
        }
        .overall-stat .num { font-weight: 700; }
        .overall-stat .num.up { color: var(--green); }
        .overall-stat .num.down { color: var(--red); }

        /* Response time bar */
        .response-time {
            margin-top: 8px; font-size: 12px; color: var(--text-muted);
        }
        .response-time-bar {
            height: 4px; border-radius: 2px; background: var(--surface2);
            margin-top: 4px; overflow: hidden;
        }
        .response-time-fill {
            height: 100%; border-radius: 2px;
            transition: width .3s;
        }
        .rt-fast { background: var(--green); }
        .rt-medium { background: var(--yellow); }
        .rt-slow { background: var(--red); }

        .last-check {
            font-size: 12px; color: var(--text-muted);
            text-align: center; padding: 8px 32px 24px;
        }

        @media (max-width: 900px) {
            .header { padding: 16px 20px; }
            .health-section { padding: 0 20px 16px; }
        }
    </style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<div class="header">
    <div>
        <h1>
            <span class="logo">&#9670;</span>
            System Health
        </h1>
        <div class="breadcrumbs" style="margin-top:4px;margin-left:38px">
            <a href="/">Doc Generator</a><span class="sep">/</span><span class="current">Health</span>
        </div>
    </div>
    <div class="header-right">
        <nav class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/graph">Graph</a>
            <a href="/chat">Chat</a>
            <a href="/ingest">Ingest</a>
            <a href="/health" class="active">Health</a>
            <a href="/integrations">Integrations</a>
        </nav>
        <span id="lastUpdated"></span>
        <button class="btn" onclick="loadHealth()">&#8635; Refresh</button>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">&#9728;</button>
    </div>
</div>

<main id="main">
<div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <div style="color: var(--text-muted)">Checking health...</div>
</div>

<div id="healthContent"></div>

<div id="lastCheck" class="last-check"></div>
</main>

<script>
    let autoRefreshTimer = null;

    // Component category mapping
    const CATEGORIES = {
        'Database': { icon: '&#128451;', components: ['db', 'database', 'postgres', 'pgvector'] },
        'AI / ML': { icon: '&#129302;', components: ['ollama', 'openai', 'embedding'] },
        'Infrastructure': { icon: '&#9881;', components: ['diskSpace', 'disk', 'ping', 'livenessState', 'readinessState'] },
        'Other': { icon: '&#128295;', components: [] },
    };

    function categorize(name) {
        const lower = name.toLowerCase();
        for (const [cat, cfg] of Object.entries(CATEGORIES)) {
            if (cat === 'Other') continue;
            if (cfg.components.some(c => lower.includes(c.toLowerCase()))) return cat;
        }
        return 'Other';
    }

    async function loadHealth() {
        const loading = document.getElementById('loading');
        const content = document.getElementById('healthContent');

        loading.style.display = 'flex';
        content.innerHTML = '';

        const startTime = performance.now();

        try {
            const res = await fetch('/actuator/health');
            const elapsed = Math.round(performance.now() - startTime);
            const data = await res.json();

            loading.style.display = 'none';
            renderHealth(data, elapsed);

            document.getElementById('lastUpdated').textContent =
                'Updated: ' + new Date().toLocaleTimeString('ru-RU');
            document.getElementById('lastCheck').textContent =
                'Auto-refresh every 30 seconds | Response time: ' + elapsed + 'ms';
        } catch (e) {
            loading.style.display = 'none';
            console.error('Health check error:', e);
            content.innerHTML =
                '<div class="health-section"><div class="health-grid">' +
                '<div class="health-card overall-card">' +
                    '<div class="health-card-header">' +
                        '<span class="health-card-name">System</span>' +
                        '<span class="health-status health-down">DOWN</span>' +
                    '</div>' +
                    '<div class="health-details">' +
                        '<dt>Error</dt><dd>' + esc(e.message) + '</dd>' +
                    '</div>' +
                '</div>' +
                '</div></div>';
        }
    }

    function renderHealth(data, responseTime) {
        const content = document.getElementById('healthContent');
        const components = data.components || {};

        // Count UP/DOWN
        let upCount = 0, downCount = 0;
        for (const comp of Object.values(components)) {
            const s = (comp.status || '').toUpperCase();
            if (s === 'UP') upCount++;
            else if (s === 'DOWN') downCount++;
        }

        // Overall section
        const overallStatus = (data.status || 'UNKNOWN').toUpperCase();
        const overallClass = getHealthClass(overallStatus);

        let html = '<div class="health-section"><div class="health-grid">';
        html += '<div class="health-card overall-card">' +
            '<div class="health-card-header">' +
                '<div class="health-card-title">' +
                    '<span class="health-card-icon">&#9889;</span>' +
                    '<span class="health-card-name">System Overview</span>' +
                '</div>' +
                '<span class="health-status ' + overallClass + '">' + overallStatus + '</span>' +
            '</div>' +
            '<div class="overall-summary">' +
                '<span class="overall-stat"><span class="num up">' + upCount + '</span> healthy</span>' +
                (downCount > 0 ? '<span class="overall-stat"><span class="num down">' + downCount + '</span> unhealthy</span>' : '') +
                '<span class="overall-stat"><span class="num">' + Object.keys(components).length + '</span> components</span>' +
                '<span class="overall-stat">Response: <span class="num">' + responseTime + 'ms</span></span>' +
            '</div>' +
        '</div>';
        html += '</div></div>';

        // Group components by category
        const grouped = {};
        for (const [name, comp] of Object.entries(components)) {
            const cat = categorize(name);
            if (!grouped[cat]) grouped[cat] = [];
            grouped[cat].push({ name, ...comp });
        }

        // Render each category
        for (const [category, cfg] of Object.entries(CATEGORIES)) {
            const items = grouped[category];
            if (!items || items.length === 0) continue;

            html += '<div class="health-section">';
            html += '<div class="health-section-title">' + cfg.icon + ' ' + category + '</div>';
            html += '<div class="health-grid">';

            for (const comp of items) {
                const status = (comp.status || 'UNKNOWN').toUpperCase();
                const statusClass = getHealthClass(status);
                const details = comp.details || {};

                html += '<div class="health-card">' +
                    '<div class="health-card-header">' +
                        '<span class="health-card-name">' + esc(comp.name) + '</span>' +
                        '<span class="health-status ' + statusClass + '">' + status + '</span>' +
                    '</div>';

                if (Object.keys(details).length > 0) {
                    html += '<dl class="health-details">';
                    for (const [key, val] of Object.entries(details)) {
                        html += '<dt>' + esc(key) + '</dt>';
                        html += '<dd>' + esc(formatValue(val)) + '</dd>';
                    }
                    html += '</dl>';
                }

                html += '</div>';
            }

            html += '</div></div>';
        }

        content.innerHTML = html;
    }

    function getHealthClass(status) {
        if (status === 'UP') return 'health-up';
        if (status === 'DOWN') return 'health-down';
        return 'health-unknown';
    }

    function formatValue(val) {
        if (val == null) return '\u2014';
        if (typeof val === 'object') return JSON.stringify(val);
        return String(val);
    }

    // Auto-refresh every 30 seconds
    function startAutoRefresh() {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(loadHealth, 30000);
    }

    loadHealth();
    startAutoRefresh();
</script>

</body>
</html>
